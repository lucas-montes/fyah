# Fyah development configuration
# Overrides the XDG default at ~/.config/fyah/config.toml

[llm.providers.openai]
url = "https://api.openai.com/v1"
api_key = "sk-test-key"

[[llm.providers.openai.models]]
name = "gpt-4o"
temperature = 0.7
max_tokens = 4096

[llm.providers.ollama]
url = "http://127.0.0.1:11434/v1"

[[llm.providers.ollama.models]]
name = "phi3:mini"
temperature = 0.3

[[llm.agents]]
name = "primary"
model = "gpt-4o"
max_iterations = 25
system_prompt = "You are Fyah, an AI coding assistant."
temperature = 0.3
max_tokens = 2048
context = { sliding_window = { max_messages = 20 } }
